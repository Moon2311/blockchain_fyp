<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register | Chain of Custody</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet"/>
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet"/>
</head>
<body class="login-body">

<div class="login-wrapper">
  <div class="login-card shadow-lg">

    <div class="text-center mb-4">
      <div class="login-icon mb-3">
        <i class="fa-solid fa-user-plus fa-2x text-primary-custom"></i>
      </div>
      <h3 class="fw-bold">Create account</h3>
      <p class="text-muted small">Investigator or Member — Admin is created on first server start</p>
    </div>

    {% for cat, msg in get_flashed_messages(with_categories=true) %}
    <div class="alert alert-{{ cat }} alert-dismissible fade show" role="alert">
      {{ msg }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}

    <form method="POST">
      <div class="mb-3">
        <label class="form-label fw-semibold">Email</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
          <input type="email" name="email" class="form-control" placeholder="you@example.com" required autofocus/>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Display name</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fa-solid fa-id-card"></i></span>
          <input type="text" name="name" class="form-control" placeholder="Full name" required/>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Role</label>
        <select name="role" class="form-select" required>
          <option value="Investigator">Investigator (Analyst)</option>
          <option value="Member">Member</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
          <input type="password" name="password" class="form-control" minlength="8" placeholder="At least 8 characters" required/>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Confirm password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
          <input type="password" name="password2" class="form-control" minlength="8" required/>
        </div>
      </div>
      <button type="submit" class="btn btn-primary-custom w-100 fw-bold mb-3">
        <i class="fa-solid fa-user-check me-2"></i>Sign up
      </button>
      <p class="text-center small mb-0">
        <a href="{{ url_for('login') }}">Already have an account? Sign in</a>
      </p>
    </form>

    <p class="text-center text-muted small mt-3 mb-0">
      FYP – M. Talha &nbsp;|&nbsp; fa-2022/BS/DFCS/075
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
