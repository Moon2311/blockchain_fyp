{% extends "base.html" %}
{% block title %}Help{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <h1 class="h3 mb-4"><i class="fa-solid fa-circle-question me-2 text-primary-custom"></i>Help topics</h1>
    <p class="text-muted">Content is loaded from the SQLite database (<code>custody.db</code>) in the backend folder.</p>
    <div class="list-group shadow-sm">
      {% for t in topics %}
      <a class="list-group-item list-group-item-action d-flex justify-content-between align-items-center"
         href="{{ url_for(t.endpoint) }}">
        <span>{{ t.title }}</span>
        <i class="fa-solid fa-chevron-right text-muted small"></i>
      </a>
      {% endfor %}
    </div>
  </div>
</div>
{% endblock %}
