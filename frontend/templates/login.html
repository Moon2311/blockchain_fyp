<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | Chain of Custody</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet"/>
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet"/>
</head>
<body class="login-body">

<div class="login-wrapper">
  <div class="login-card shadow-lg">

    <!-- Brand -->
    <div class="text-center mb-4">
      <div class="login-icon mb-3">
        <i class="fa-solid fa-link-slash fa-2x text-primary-custom"></i>
      </div>
      <h3 class="fw-bold">ChainCustody</h3>
      <p class="text-muted small">Blockchain-Based Digital Forensics</p>
    </div>

    <!-- Flash -->
    {% for cat, msg in get_flashed_messages(with_categories=true) %}
    <div class="alert alert-{{ cat }} alert-dismissible fade show" role="alert">
      {{ msg }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}

    <!-- Form -->
    <form method="POST">
      <div class="mb-3">
        <label class="form-label fw-semibold">Email</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
          <input type="email" name="email" class="form-control"
                 placeholder="your@email.com" required autofocus autocomplete="username"/>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
          <input type="password" name="password" class="form-control"
                 placeholder="Enter password" required autocomplete="current-password"/>
        </div>
      </div>
      <button type="submit" class="btn btn-primary-custom w-100 fw-bold">
        <i class="fa-solid fa-right-to-bracket me-2"></i>Sign In
      </button>
    </form>

    <p class="text-center small mt-3 mb-0">
      <a href="{{ url_for('register') }}">Create an account</a>
    </p>

    <p class="text-center text-muted small mt-3">
      FYP – M. Talha &nbsp;|&nbsp; fa-2022/BS/DFCS/075
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
