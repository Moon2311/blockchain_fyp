{% extends "base.html" %}
{% block title %}Admin{% endblock %}

{% block content %}
<h2 class="fw-bold mb-4"><i class="fa-solid fa-user-shield me-2"></i>Administration</h2>
<p class="text-muted">Manage users, assign cases to investigators/members, approve access requests.</p>

<div class="row g-4">
  <div class="col-md-4">
    <div class="card border-0 shadow-sm h-100">
      <div class="card-body text-center">
        <a href="{{ url_for('admin.admin_users') }}" class="btn btn-outline-primary w-100 py-3">
          <i class="fa-solid fa-users me-2"></i>Users &amp; roles
        </a>
      </div>
    </div>
  </div>
  <div class="col-md-4">
    <div class="card border-0 shadow-sm h-100">
      <div class="card-body text-center">
        <a href="{{ url_for('admin.admin_assign_cases') }}" class="btn btn-outline-success w-100 py-3">
          <i class="fa-solid fa-link me-2"></i>Assign cases
        </a>
      </div>
    </div>
  </div>
  <div class="col-md-4">
    <div class="card border-0 shadow-sm h-100">
      <div class="card-body text-center">
        <a href="{{ url_for('admin.admin_case_requests') }}" class="btn btn-outline-warning w-100 py-3">
          <i class="fa-solid fa-inbox me-2"></i>Access requests
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
