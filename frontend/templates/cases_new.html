{% extends "base.html" %}
{% block title %}New Case{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <h2 class="fw-bold mb-4"><i class="fa-solid fa-folder-plus me-2"></i>Create Case</h2>
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">Title</label>
            <input type="text" name="title" class="form-control" required placeholder="e.g. Mobile device exfiltration — Case A"/>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Description <span class="text-muted fw-normal">(optional)</span></label>
            <textarea name="description" class="form-control" rows="3"></textarea>
          </div>
          <button type="submit" class="btn btn-primary-custom">Create</button>
          <a href="{{ url_for('features.cases_list') }}" class="btn btn-outline-secondary">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
